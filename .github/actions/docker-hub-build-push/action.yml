# Shared Hub multi-arch build/push for publish.yaml and push-edge.yml.
# Keep platforms in sync with ci/push-to-docker.sh default PUSH_PLATFORMS
# (linux/amd64,linux/arm64). Smoke jobs in ci.yml stay single-arch / load-only.
name: Docker Hub multi-arch build and push
description: >
  Set up QEMU + Buildx, log in to Docker Hub, and build/push a multi-arch image.
  Default platforms match ci/push-to-docker.sh (PUSH_PLATFORMS).

inputs:
  tags:
    description: Image tags to push (newline-separated for multiple tags)
    required: true
  platforms:
    description: Target platforms (comma-separated)
    required: false
    default: linux/amd64,linux/arm64
  username:
    description: Docker Hub username
    required: true
  password:
    description: Docker Hub password or access token
    required: true
  context:
    description: Build context path
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        push: true
        platforms: ${{ inputs.platforms }}
        tags: ${{ inputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
