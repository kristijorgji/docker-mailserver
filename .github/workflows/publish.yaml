# Publish workflow for docker-mailserver
# - Triggers: push of version tags (v*)
# - Builds and pushes Docker image; creates GitHub Release from CHANGELOG.md
# - Secrets: DOCKER_HUB_USERNAME, DOCKER_HUB_AUTH, GITHUB_TOKEN
name: Publish
on:
  push:
    tags:
      - '*'
jobs:
  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      IMAGE_NAME: docker-mailserver
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_AUTH: ${{ secrets.DOCKER_HUB_AUTH }}

    steps:
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_AUTH }}

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/docker-mailserver:${{ env.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes from CHANGELOG
        run: |
          chmod +x ci/extract-changelog-section.sh
          ./ci/extract-changelog-section.sh "${{ env.RELEASE_VERSION }}" > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG section for ${{ env.RELEASE_VERSION }}; using tag name only." > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_VERSION }}" \
            --title "${{ env.RELEASE_VERSION }}" \
            --notes-file /tmp/release-notes.md
