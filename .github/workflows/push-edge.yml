# Push pre-release images to Docker Hub (not a GitHub Release).
# - Triggers: push to main (after PR merge), workflow_dispatch (manual)
# - Tags: :edge (moving tip) and :sha-<7hex> (immutable pin)
# - Official vX.Y.Z releases remain in publish.yaml only
# - Secrets: DOCKER_HUB_USERNAME, DOCKER_HUB_AUTH
name: Push edge image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  push-edge:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: docker-mailserver
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA tag
        run: echo "SHA_TAG=sha-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_ENV"

      - name: Build and push multi-arch edge + sha tags
        uses: ./.github/actions/docker-hub-build-push
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_AUTH }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-mailserver:edge
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-mailserver:${{ env.SHA_TAG }}
