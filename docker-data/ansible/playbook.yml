---

- hosts: localhost
  vars:
    files_path: "{{ playbook_dir }}/files"
    templates_path: "{{ playbook_dir }}/templates"
    rbuild_path: "ansible_tmp"
  pre_tasks:
    - name: always
      tags:
        - always
      block:
        - name: "Include all .y(a)ml user specified vars in {{ user_configs_path }} and all nested directories"
          ansible.builtin.include_vars:
            dir: "{{ user_configs_path }}/vars"
            extensions:
              - 'yaml'
              - 'yml'
        - name: "ensure remote build folder exist"
          ansible.builtin.file:
            path: "{{ rbuild_path }}"
            recurse: yes
            state: directory

    - name: Fail when example vault passwords are still in use
      ansible.builtin.fail:
        msg: "Change default passwords in configs/vars/vault.yml before starting the mailserver."
      when: >
        mysql_mailserver_password == '123456@'
        or mysql_root_password | default('') == '123456@'
        or mysql_mailserver_password is match('^CHANGE_ME')
        or mysql_root_password | default('') is match('^CHANGE_ME')
        or (mail_accounts | selectattr('password', 'equalto', '123456@') | list | length > 0)
        or (mail_accounts | selectattr('password', 'search', '^CHANGE_ME') | list | length > 0)
      tags:
        - always

    - name: Set tls_cert_mode from env when not explicitly defined
      ansible.builtin.set_fact:
        tls_cert_mode: "{{ 'self_signed' if env == 'local' else (tls_cert_mode | default('internal')) }}"
      tags:
        - always

    - import_tasks: tasks/_certificates.yml

    - name: "Apply postfix templates"
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "{{ item | replace(user_configs_path + '/postfix','/etc/postfix') | replace('.j2', '') }}"
        mode: "{{ '0600' if item.endswith('sasl_passwd.j2') else omit }}"
      with_fileglob:
        - "{{ user_configs_path }}/postfix/*"
      tags:
        - postfix-provision
        - reload

    - name: Build postfix sender-dependent relay maps
      when: mail_sender_relays is defined and mail_sender_relays | length > 0
      block:
        - name: postmap sender_dependent_relayhost
          ansible.builtin.command: postmap /etc/postfix/sender_dependent_relayhost
        - name: postmap sasl_passwd
          ansible.builtin.command: postmap /etc/postfix/sasl_passwd
      tags:
        - postfix-provision
        - reload

    - name: Ensure dovecot sieve directory exists
      ansible.builtin.file:
        path: /etc/dovecot/sieve
        state: directory
        mode: "0755"
      tags:
        - dovecot-provision
        - reload

    - name: Ensure dovecot scripts directory exists
      ansible.builtin.file:
        path: /etc/dovecot/scripts
        state: directory
        mode: "0755"
      tags:
        - dovecot-provision
        - reload

    - name: "Apply dovecot templates"
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.src | replace(user_configs_path + '/dovecot','/etc/dovecot') | replace('.j2', '') }}"
      with_filetree: "{{ user_configs_path }}/dovecot/"
      when: item.state == 'file'
      tags:
        - dovecot-provision
        - reload

    - name: Install quota-warning helper for Dovecot
      ansible.builtin.copy:
        src: /etc/dovecot/scripts/quota-warning.sh
        dest: /usr/local/bin/quota-warning
        remote_src: true
        mode: "0755"
        owner: root
        group: root
      when: enable_mailbox_quotas | default(true) | bool
      tags:
        - dovecot-provision
        - reload

    - import_tasks: tasks/_schema-init.yml

    - import_tasks: tasks/_opendkim.yml
    - import_tasks: tasks/_rspamd.yml
    - import_tasks: tasks/_postgrey.yml
    - import_tasks: tasks/_postfwd.yml
    - import_tasks: tasks/_dovecot-sieve.yml

    - name: restart postfix
      ansible.builtin.service:
        name: postfix
        state: restarted
      tags:
        - reload

    - name: restart dovecot
      ansible.builtin.service:
        name: dovecot
        state: restarted
      tags:
        - reload
